<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>River Magnets Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        River Admin
        <small>Operations Dashboard</small>
      </div>
      <nav>
        <a class="nav-item active" data-view="dashboard">Dashboard</a>
        <a class="nav-item" data-view="orders">Orders</a>
        <a class="nav-item" data-view="designs">Designs</a>
        <a class="nav-item" data-view="contacts">Contacts</a>
        <a class="nav-item" data-view="products">Products</a>
        <a class="nav-item" data-view="users">Users</a>
        <a class="nav-item" data-view="audit">Audit</a>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <button type="button" class="btn btn--ghost btn--sm" id="logout-btn">Logout</button>
      </header>
      <div class="content" id="content"></div>
    </div>
  </div>

  <div class="modal-overlay" id="ship-modal">
    <div class="modal">
      <h3>Mark as Shipped</h3>
      <input type="hidden" id="ship-order-id" />
      <div class="form-group">
        <label>Carrier</label>
        <input type="text" id="ship-carrier" placeholder="USPS / FedEx / DHL" />
      </div>
      <div class="form-group">
        <label>Tracking Number</label>
        <input type="text" id="ship-tracking" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn--ghost" id="ship-cancel">Cancel</button>
        <button type="button" class="btn btn--primary" id="ship-submit">Save &amp; Ship</button>
      </div>
    </div>
  </div>

  <script src="js/admin-api.js"></script>
  <script src="js/admin-app.js"></script>
</body>
</html>
