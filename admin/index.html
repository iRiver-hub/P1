<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>River Magnets Admin � Login</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>River Magnets Admin</h1>
      <p>??????</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">???</label>
          <input type="text" id="username" value="admin" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">??</label>
          <input type="password" id="password" value="admin123" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%">??</button>
        <p class="err" id="error" hidden></p>
      </form>
    </div>
  </div>
  <script src="js/admin-api.js"></script>
  <script>
    if (AdminAPI.getToken()) location.href = "app.html";
    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var err = document.getElementById("error");
      err.hidden = true;
      AdminAPI.login(
        document.getElementById("username").value,
        document.getElementById("password").value
      ).then(function (data) {
        AdminAPI.setToken(data.token);
        location.href = "app.html";
      }).catch(function (ex) {
        err.textContent = ex.message;
        err.hidden = false;
      });
    });
  </script>
</body>
</html>
