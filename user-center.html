<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Orders — River Magnets</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .account-page { max-width: 960px; margin: 0 auto; padding: 40px 20px 80px; }
    .account-page h1 { margin-bottom: 8px; }
    .account-sub { color: var(--text-muted, #666); margin-bottom: 32px; }
    .order-card { background: var(--surface, #fff); border: 1px solid var(--border, #e5e7eb); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .order-card__head { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .order-card__meta { font-size: .9rem; color: var(--text-muted, #666); }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; background: #e0f2fe; color: #0369a1; }
    .status-badge.paid, .status-badge.shipped, .status-badge.delivered { background: #dcfce7; color: #166534; }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .order-items { font-size: .9rem; margin-top: 12px; }
    .order-items li { padding: 4px 0; }
    .account-login { text-align: center; padding: 60px 20px; }
    .payment-banner { background: #dcfce7; color: #166534; padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; }
    .pay-btn { margin-top: 12px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="../index.html">River Magnets</a>
      <nav class="nav">
        <a href="../index.html#customizer">Customize</a>
        <a href="../index.html#checkout">Order</a>
      </nav>
    </div>
  </header>

  <main class="account-page" id="main">
    <div class="account-login" id="login-prompt" hidden>
      <h1>My Orders</h1>
      <p class="account-sub">Please log in to view your orders.</p>
      <a class="btn btn--primary" href="../index.html" onclick="localStorage.setItem('river-open-login','1')">Go to Login</a>
    </div>

    <div id="account-content" hidden>
      <h1>My Orders</h1>
      <p class="account-sub">Welcome, <span id="user-name"></span></p>
      <div id="payment-banner" class="payment-banner" hidden></div>
      <div id="orders-list"></div>
    </div>
  </main>

  <script src="../js/api-base.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/user-center.js"></script>
</body>
</html>
